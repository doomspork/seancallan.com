[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

[[redirects]]
  from = "/writings/"
  to = "/#writings"
  status = 301

[[redirects]]
  from = "/contributions/"
  to = "/#projects"
  status = 301

[[redirects]]
  from = "/experience/"
  to = "/"
  status = 301

[[redirects]]
  from = "/contact/"
  to = "/#contact"
  status = 301
